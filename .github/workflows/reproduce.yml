name: Reproduce experiment

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-reproduce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Test
        run: pytest
      - name: Reproduce fixed-seed outputs
        run: python run_experiment.py --out reproduced-results
      - name: Verify committed summary
        run: python tools/verify_results.py results/summary.json reproduced-results/summary.json
      - name: Upload reproduced outputs
        uses: actions/upload-artifact@v4
        with:
          name: vigil-reproduced-results
          path: reproduced-results/
